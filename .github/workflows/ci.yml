name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: Install PostgreSQL 18 client tools
        # pg_basebackup is version-locked to the server. The integration
        # tests spin up postgres:18 via testcontainers; the runner needs
        # a matching client. ubuntu-latest pre-installs an older
        # postgresql-client-common with /usr/bin/pg_basebackup pointing at
        # PG 16 — installing postgresql-client-18 alone is not enough;
        # we must put /usr/lib/postgresql/18/bin first on PATH.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/18/bin/pg_basebackup --version
      - name: Run canonical CI gate
        run: ./run-ci-local.sh
